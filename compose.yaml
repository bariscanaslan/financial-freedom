services:
  redis:
    image: redis:7-alpine
    command: redis-server --port 6389 --save "" --appendonly no --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:${REDIS_PORT:-6389}:6389"
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6389", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      SPP_API_HOST: 0.0.0.0
      SPP_API_PORT: 8089
      SPP_API_REDIS_URL: redis://redis:6389/0
      SPP_API_CORS_ORIGINS: '["http://${VPN_BIND_ADDRESS:-127.0.0.1}:${FRONTEND_PORT:-3007}"]'
      SPP_API_NOTIFICATION_INTERVAL_SECONDS: 900
    volumes:
      - ./cache:/app/cache
      - ./models:/app/models
      - ./portfolio_data:/app/portfolio_data 
    ports:
      - "127.0.0.1:${BACKEND_PORT:-8089}:8089"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8089/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /api
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3007/"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${VPN_BIND_ADDRESS:-127.0.0.1}:${FRONTEND_PORT:-3007}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      ui:
        condition: service_healthy
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 5s
    restart: unless-stopped
